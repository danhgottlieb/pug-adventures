<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Pug Adventures — Arcade Select</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a0a1a;
      font-family: 'Press Start 2P', monospace;
      color: #FFD700;
      overflow-x: hidden;
      padding: 24px 12px;
      padding-top: env(safe-area-inset-top, 24px);
      padding-bottom: env(safe-area-inset-bottom, 24px);
    }

    h1 {
      font-size: clamp(18px, 5vw, 36px);
      text-align: center;
      color: #FFD700;
      text-shadow:
        0 0 10px rgba(255, 215, 0, 0.8),
        0 0 30px rgba(255, 170, 0, 0.5),
        0 0 60px rgba(255, 140, 0, 0.3);
      margin-bottom: 10px;
      margin-top: 8vh;
      letter-spacing: 2px;
    }

    #titlePug {
      display: block;
      margin: 0 auto 6px;
      width: 120px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: drop-shadow(0 0 20px rgba(255, 180, 50, 0.6));
    }

    .subtitle {
      font-size: clamp(9px, 2.5vw, 14px);
      color: #FFAA00;
      text-align: center;
      margin-bottom: 14px;
      text-shadow: 0 0 8px rgba(255, 170, 0, 0.4);
    }

    .cards {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 700px;
      width: 100%;
    }

    .card {
      background: #12122a;
      border: 3px solid #333366;
      border-radius: 4px;
      padding: 12px;
      width: 320px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card:hover, .card:focus-visible {
      border-color: #FFD700;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.35), 0 0 50px rgba(255, 215, 0, 0.15);
      transform: translateY(-3px);
    }

    .card:active {
      transform: translateY(0);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    }

    .card-title {
      font-size: 13px;
      color: #FFD700;
      margin-bottom: 8px;
      text-shadow: 0 0 6px rgba(255, 215, 0, 0.5);
      text-align: center;
    }

    .card canvas {
      border: 2px solid #444;
      border-radius: 2px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 8px;
      line-height: 1.8;
      color: #aaa;
      text-align: center;
    }

    /* Controls section */
    .controls-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
      gap: 10px;
    }

    .controls-label {
      font-size: 11px;
      color: #FFAA00;
      text-shadow: 0 0 6px rgba(255, 170, 0, 0.4);
    }

    .controls-sublabel {
      font-size: 8px;
      color: #886600;
    }

    .controls-btns {
      display: flex;
      gap: 14px;
    }

    .ctrl-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      padding: 10px 18px;
      background: #1a1a3a;
      border: 2px solid #444;
      border-radius: 3px;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .ctrl-btn .btn-desc {
      font-size: 7px;
      color: #666;
      transition: color 0.2s;
    }

    .ctrl-btn.selected {
      border-color: #FFD700;
      color: #FFD700;
      box-shadow: 0 0 14px rgba(255, 215, 0, 0.45), 0 0 40px rgba(255, 215, 0, 0.15);
      background: #28285a;
    }

    .ctrl-btn.selected .btn-desc {
      color: #FFAA00;
    }

    .ctrl-btn:hover {
      border-color: #FFAA00;
      color: #FFD700;
    }

    footer {
      margin-top: auto;
      padding-top: 20px;
      font-size: 7px;
      color: #333;
      text-align: center;
    }

    @media (max-width: 720px) {
      .cards { flex-direction: column; align-items: center; }
      .card { width: min(320px, 90vw); }
    }
  </style>
</head>
<body>

  <h1>PUG ADVENTURES</h1>
  <img id="titlePug" src="BigPug.png" alt="Pug">
  <p class="subtitle">Choose your adventure!</p>

  <div class="cards">
    <a class="card" id="cardMunch" href="pug-munch.html">
      <div class="card-title">🕹️ CLASSIC ARCADE</div>
      <canvas id="previewMunch" width="200" height="150"></canvas>
      <p class="card-desc">Navigate the maze, eat all the kibble, dodge the bees!</p>
    </a>
    <a class="card" id="cardPark" href="doofs-day-out.html">
      <div class="card-title">🌳 PARK ADVENTURE</div>
      <canvas id="previewPark" width="200" height="150"></canvas>
      <p class="card-desc">Explore the park, collect treats, avoid the squirrels!</p>
    </a>
  </div>

  <div class="controls-section" id="controlsSection">
    <span class="controls-label">TOUCH CONTROLS</span>
    <span class="controls-sublabel">(for mobile play)</span>
    <div class="controls-btns">
      <button class="ctrl-btn selected" id="btnGamepad" data-mode="gamepad">🎮 GAMEPAD<span class="btn-desc">Virtual joystick overlay</span></button>
      <button class="ctrl-btn" id="btnSwipe" data-mode="swipe">👆 SWIPE<span class="btn-desc">Swipe anywhere to move</span></button>
    </div>
  </div>

  <footer>v1.0 — Pug Adventures</footer>

  <script>
    // --- Control mode (always visible) ---
    const isTouch = 'ontouchstart' in window;
    let controlMode = localStorage.getItem('pugControlMode') || 'gamepad';

    applyControlSelection();

    function applyControlSelection() {
      document.getElementById('btnGamepad').classList.toggle('selected', controlMode === 'gamepad');
      document.getElementById('btnSwipe').classList.toggle('selected', controlMode === 'swipe');
    }

    document.querySelectorAll('.ctrl-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        controlMode = btn.dataset.mode;
        localStorage.setItem('pugControlMode', controlMode);
        applyControlSelection();
      });
    });

    // --- Navigation ---
    function navigate(baseHref) {
      const sep = baseHref.includes('?') ? '&' : '?';
      window.location.href = baseHref + sep + 'controls=' + controlMode;
    }

    document.getElementById('cardMunch').addEventListener('click', e => {
      e.preventDefault();
      navigate('pug-munch.html');
    });
    document.getElementById('cardPark').addEventListener('click', e => {
      e.preventDefault();
      navigate('doofs-day-out.html');
    });

    // --- Preview canvases ---
    const dpr = 1; // keep pixel-crisp at 1:1

    // Load pug image for preview canvases
    const pugImg = new Image();
    pugImg.src = 'BigPug.png';
    pugImg.onload = function () {
      startMunchPreview();
      startParkPreview();
    };

    // -- Pug Munch preview (blue maze + dots) --
    function startMunchPreview() {
      const c = document.getElementById('previewMunch');
      const ctx = c.getContext('2d');
      const W = c.width, H = c.height;

      // maze wall segments (x, y, w, h) in grid units; grid is 20x15
      const GW = 10, GH = 7.5, CW = W / GW, CH = H / GH;
      const walls = [
        // outer walls
        [0,0,10,0.4], [0,0,0.4,7.5], [9.6,0,0.4,7.5], [0,7.1,10,0.4],
        // inner walls
        [1.5,1.5,2,0.4], [4.5,1.0,0.4,2.5], [6,1.5,2.5,0.4],
        [1.5,3,1.5,0.4], [1.5,3,0.4,1.5], [3.5,2.8,0.4,2],
        [5.5,3,3,0.4], [6.5,3.4,0.4,1.5],
        [1.5,5.2,2,0.4], [5,5.2,1.5,0.4], [7.5,5,0.4,1.5],
      ];

      // dot positions
      const dots = [];
      for (let gx = 0.8; gx < 10; gx += 1.1) {
        for (let gy = 0.7; gy < 7.5; gy += 1.0) {
          // skip if inside a wall
          let inside = false;
          for (const [wx, wy, ww, wh] of walls) {
            if (gx > wx && gx < wx + ww && gy > wy && gy < wy + wh) { inside = true; break; }
          }
          if (!inside) dots.push([gx * CW, gy * CH]);
        }
      }

      let frame = 0;
      function render() {
        ctx.fillStyle = '#000010';
        ctx.fillRect(0, 0, W, H);

        // walls
        ctx.fillStyle = '#2244CC';
        ctx.shadowColor = 'rgba(34,68,204,0.5)';
        ctx.shadowBlur = 4;
        for (const [x, y, w, h] of walls) {
          ctx.fillRect(x * CW, y * CH, w * CW, h * CH);
        }
        ctx.shadowBlur = 0;

        // dots (blink every ~60 frames)
        for (let i = 0; i < dots.length; i++) {
          const blink = (frame + i * 7) % 90 < 8;
          ctx.fillStyle = blink ? '#FFFFFF' : '#FFD700';
          const r = blink ? 3.5 : 2.5;
          ctx.beginPath();
          ctx.arc(dots[i][0], dots[i][1], r, 0, Math.PI * 2);
          ctx.fill();
        }

        // pug sprite moving
        const px = 100 + Math.sin(frame * 0.04) * 50;
        const py = 75 + Math.cos(frame * 0.03) * 30;
        ctx.drawImage(pugImg, px - 8, py - 8, 16, 16);

        frame++;
        requestAnimationFrame(render);
      }
      render();
    }

    // -- Park preview (green hedges, brown paths, pond) --
    function startParkPreview() {
      const c = document.getElementById('previewPark');
      const ctx = c.getContext('2d');
      const W = c.width, H = c.height;

      // grass base
      const hedges = [
        [0,0,200,8], [0,0,8,150], [192,0,8,150], [0,142,200,8],
        [30,30,6,50], [30,30,60,6],
        [110,25,6,55], [110,25,60,6],
        [30,100,50,6], [130,95,6,50],
        [60,60,30,6], [150,65,40,6],
      ];

      // path rects
      const paths = [
        [36,36,74,12], [36,80,30,20],
        [116,31,20,64], [50,106,80,10],
        [140,100,20,42],
      ];

      // pond
      const pond = { x: 160, y: 45, rx: 22, ry: 16 };

      // treats
      const treats = [
        [55, 50], [90, 42], [70, 115], [45, 90],
        [155, 110], [100, 70], [135, 55],
      ];

      let frame = 0;
      function render() {
        // grass
        ctx.fillStyle = '#2E5016';
        ctx.fillRect(0, 0, W, H);

        // paths
        ctx.fillStyle = '#8B6914';
        for (const [x, y, w, h] of paths) {
          ctx.fillRect(x, y, w, h);
        }

        // pond
        ctx.fillStyle = '#1565C0';
        ctx.shadowColor = 'rgba(21,101,192,0.5)';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.ellipse(pond.x, pond.y, pond.rx + Math.sin(frame * 0.05) * 1.5, pond.ry, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // pond shimmer
        ctx.fillStyle = 'rgba(100,200,255,0.3)';
        ctx.beginPath();
        ctx.ellipse(pond.x - 6, pond.y - 4, 6 + Math.sin(frame * 0.08) * 2, 3, 0, 0, Math.PI * 2);
        ctx.fill();

        // hedges
        ctx.fillStyle = '#1B5E20';
        ctx.shadowColor = 'rgba(27,94,32,0.4)';
        ctx.shadowBlur = 3;
        for (const [x, y, w, h] of hedges) {
          ctx.fillRect(x, y, w, h);
        }
        ctx.shadowBlur = 0;

        // treats (blink)
        for (let i = 0; i < treats.length; i++) {
          const blink = (frame + i * 11) % 80 < 10;
          ctx.fillStyle = blink ? '#FFFFFF' : '#FFAB00';
          const r = blink ? 3.5 : 2.5;
          ctx.beginPath();
          ctx.arc(treats[i][0], treats[i][1], r, 0, Math.PI * 2);
          ctx.fill();
        }

        // pug sprite moving on path
        const px = 70 + Math.sin(frame * 0.035) * 40;
        const py = 42 + Math.cos(frame * 0.025) * 15;
        ctx.drawImage(pugImg, px - 8, py - 8, 16, 16);

        frame++;
        requestAnimationFrame(render);
      }
      render();
    }
  </script>
</body>
</html>
